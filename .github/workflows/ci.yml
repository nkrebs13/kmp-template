name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Explicitly declare minimal permissions for security
permissions:
  contents: read

jobs:
  build:
    name: Build & Lint
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@fbcece063590cf3e99cc8f93ed063231c98bf95b # v5
        with:
          validate-wrappers: true

      - name: Check formatting & static analysis
        run: ./gradlew spotlessCheck detekt

      - name: Build & Test
        # :shared:allTests includes iosSimulatorArm64Test — iOS tests run here
        run: ./gradlew :androidApp:assembleDebug :androidApp:lintDebug :shared:linkDebugFrameworkIosSimulatorArm64 :shared:allTests :shared:koverVerify

      - name: Generate coverage report
        if: always()
        run: ./gradlew :shared:koverXmlReport :shared:koverHtmlReport

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: shared/build/reports/kover/
          retention-days: 14

  template-test:
    name: Template Generation
    runs-on: macos-14
    timeout-minutes: 20
    env:
      TEST_PROJECT: MyApp
      TEST_PACKAGE: com.example.myapp
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@fbcece063590cf3e99cc8f93ed063231c98bf95b # v5
        with:
          validate-wrappers: true

      - name: Run setup.sh
        run: |
          # Provide all 4 prompts: project name, package name, iOS bundle ID (same), confirm
          printf '%s\n%s\n%s\ny\n' "$TEST_PROJECT" "$TEST_PACKAGE" "$TEST_PACKAGE" | ./setup.sh

      - name: Verify no template references
        run: |
          FOUND=$(grep -rI -E "com[./]template[./]|com[./]template[^a-z0-9]|TemplateApp|KmpTemplate|orgName" . \
            --include="*.kt" --include="*.kts" --include="*.xml" \
            --include="*.swift" --include="*.plist" --include="*.pro" \
            --include="*.pbxproj" --include="*.xcscheme" \
            --include="*.toml" --include="*.conf" --include="*.sh" \
            --exclude-dir=.git --exclude-dir=build --exclude-dir=.gradle \
            2>/dev/null | wc -l | tr -d ' ')
          if [ "$FOUND" -gt 0 ]; then
            echo "ERROR: Found template references in generated project:"
            grep -rI -E "com[./]template[./]|com[./]template[^a-z0-9]|TemplateApp|KmpTemplate|orgName" . \
              --include="*.kt" --include="*.kts" --include="*.xml" \
              --include="*.swift" --include="*.plist" --include="*.pro" \
              --include="*.pbxproj" --include="*.xcscheme" \
              --include="*.toml" --include="*.conf" --include="*.sh" \
              --exclude-dir=.git --exclude-dir=build --exclude-dir=.gradle
            exit 1
          fi
          echo "No template references found"

      - name: Verify template artifacts removed
        run: |
          ERRORS=0
          for f in setup.sh CHANGELOG.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md docs/TEMPLATE_DEVELOPMENT.md docs/CONFIGURATION.md; do
            if [ -f "$f" ]; then
              echo "ERROR: Template file not removed: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ -d ".github" ]; then
            echo "ERROR: .github directory not removed"
            ERRORS=$((ERRORS + 1))
          fi
          # Enforce zero .claude/ files — generated projects must have NO Claude Code tooling
          if [ -d ".claude" ]; then
            echo "ERROR: .claude/ directory was not removed — generated projects must contain zero Claude Code files"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS template artifacts that should have been removed"
            exit 1
          fi
          echo "All template artifacts properly removed"

      - name: Build & test generated project
        run: ./gradlew :shared:allTests :androidApp:assembleDebug :androidApp:lintDebug :shared:linkDebugFrameworkIosSimulatorArm64
