# Compose Stability Configuration
# This file helps the Compose compiler understand which classes are stable
# for better recomposition performance

# Immutable Kotlin standard library collections are stable
# (MutableList, MutableSet, MutableMap are NOT stable — exclude them via wildcard)
kotlin.collections.List
kotlin.collections.Set
kotlin.collections.Map

# Platform classes that are stable
java.time.*
java.util.UUID
kotlin.time.*

# Common data classes (mark your own data classes as stable if they're immutable)
# com.yourapp.model.*
